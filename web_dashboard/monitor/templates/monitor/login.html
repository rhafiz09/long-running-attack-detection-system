{% extends "monitor/base.html" %}

{% block title %}Login - PLN Security Gate Authentication{% endblock %}

{% block content %}
<div class="w-full max-w-md mx-auto my-auto py-8 relative z-20 animate-fade-in">
    <!-- PLN Enterprise Authentication Card -->
    <div class="card-pln overflow-hidden shadow-2xl border border-slate-200/80">
        <!-- Top Section: PLN Corporate Blue Header -->
        <div class="bg-gradient-to-b from-pln-darkblue to-pln-blue text-center pt-8 pb-7 px-6 relative">
            <!-- Shield Logo Container -->
            <div class="inline-flex w-16 h-16 rounded-2xl bg-white shadow-xl items-center justify-center mb-3 text-pln-blue transform hover:scale-105 transition-transform duration-300">
                <svg class="w-9 h-9" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                </svg>
            </div>
            
            <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-white">PLN Security</h1>
            <p class="text-[11px] font-bold tracking-widest text-blue-200 uppercase mt-1">MULTI-ACTOR GATE AUTHENTICATING</p>
            
            <!-- Gold Accent Stripe -->
            <div class="h-1.5 w-full bg-pln-yellow absolute bottom-0 left-0"></div>
        </div>

        <!-- Bottom Section: Crisp White Form Area -->
        <div class="p-8 sm:p-10 bg-white">
            <form method="POST" action="{% url 'login' %}" class="space-y-6">
                {% csrf_token %}
                
                <!-- Username Input -->
                <div>
                    <label for="username" class="block text-[11px] font-extrabold uppercase tracking-wider text-slate-600 mb-2 flex items-center space-x-1.5">
                        <svg class="w-4 h-4 text-pln-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span>USERNAME</span>
                    </label>
                    <div class="relative">
                        <input type="text" name="username" id="username" required autofocus
                            class="w-full bg-slate-100/80 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-semibold text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-pln-blue focus:ring-2 focus:ring-pln-blue/20 transition-all"
                            placeholder="Masukkan ID / Username">
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label for="password" class="block text-[11px] font-extrabold uppercase tracking-wider text-slate-600 mb-2 flex items-center space-x-1.5">
                        <svg class="w-4 h-4 text-pln-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <span>PASSWORD</span>
                    </label>
                    <div class="relative">
                        <input type="password" name="password" id="password" required
                            class="w-full bg-slate-100/80 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-semibold text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-pln-blue focus:ring-2 focus:ring-pln-blue/20 transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Submit CTA Button (PLN Yellow) -->
                <button type="submit"
                    class="w-full py-4 px-6 rounded-xl btn-pln-yellow text-sm font-extrabold uppercase tracking-wider flex items-center justify-center space-x-2.5 shadow-lg shadow-amber-500/20 active:scale-[0.99] transition-all">
                    <svg class="w-4 h-4 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                    <span>INITIALIZE SECURE LOGIN</span>
                </button>
            </form>

            <!-- Card Footer Status Indicator -->
            <div class="mt-8 pt-5 border-t border-slate-100 flex items-center justify-center space-x-2 text-[11px] font-extrabold text-slate-500 uppercase tracking-wide">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>ROLE-BASED NETWORK CONTROL ACTIVE</span>
            </div>
        </div>
    </div>

    <!-- Default Testing Credentials Info Box -->
    <!-- <div class="mt-6 text-center">
        <div class="inline-block bg-white/80 backdrop-blur border border-slate-200/80 rounded-xl px-4 py-3 text-xs text-slate-600 shadow-sm">
            <span class="font-bold text-pln-blue uppercase tracking-wider block mb-1">💡 Info Akun Pengujian Sistem</span>
            <span>Admin / Superuser: <code class="bg-blue-50 text-pln-blue font-bold px-1.5 py-0.5 rounded border border-blue-200">admin / admin@dev123</code></span><br>
            <span class="mt-0.5 block">Analyst / Staff: <code class="bg-amber-50 text-amber-800 font-bold px-1.5 py-0.5 rounded border border-amber-200">staff / staff@dev123</code></span>
        </div>
    </div> -->
</div>
{% endblock %}
